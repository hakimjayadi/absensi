<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital - Face Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="title-section">
                <div class="header-brand">
                    <div class="header-logo">
                        <img src="dataset/BGN_LOGO.png" alt="BGN Logo">
                    </div>
                    <div class="brand-text">
                        <h1 class="title">Absensi Digital</h1>
                        <p class="subtitle">Face Recognition Attendance System</p>
                    </div>
                </div>
            </div>
            <div class="datetime-section">
                <div class="time" id="current-time">00:00:00</div>
                <div class="date" id="current-date">Senin, 1 Januari 2024</div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Camera Section -->
            <div class="camera-section">
                <div class="camera-card" id="camera-card">
                    <div class="camera-container">
                        <video id="camera-video" autoplay playsinline></video>
                        <canvas id="camera-canvas" style="display: none;"></canvas>
                                                
                        <!-- Scanning Effect -->
                        <div class="scanning-overlay" id="scanning-overlay">
                            <div class="scan-line"></div>
                            <div class="scan-corners">
                                <div class="corner top-left"></div>
                                <div class="corner top-right"></div>
                                <div class="corner bottom-left"></div>
                                <div class="corner bottom-right"></div>
                            </div>
                        </div>
                        
                        <!-- Camera Status -->
                        
                        <!-- Loading Indicator -->
                        <div class="loading-indicator" id="loading-indicator" style="display: none;">
                            <div class="spinner"></div>
                            <div class="loading-text">Memindai wajah...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Result Section -->
            <div class="result-section" id="result-section">
                <div class="result-card">
                    <div class="user-info">
                        <div class="user-avatar" id="user-avatar">
                            <img id="captured-face" src="" alt="User Face">
                        </div>
                        <div class="user-details">
                            <div class="user-name" id="user-name">-</div>
                            <div class="user-status" id="user-status">-</div>
                            <div class="check-time" id="check-time">-</div>
                        </div>
                    </div>
                    <div class="status-badge" id="status-badge">
                        <i class="fas fa-check-circle"></i>
                        <span>Berhasil Absen</span>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn btn-primary" id="start-scan">
                    <i class="fas fa-play"></i>
                    Mulai Scan Wajah
                </button>
                <button class="btn btn-secondary" id="stop-scan" style="display: none;">
                    <i class="fas fa-stop"></i>
                    Stop Scan
                </button>
            </div>


        </div>
    </main>

    <!-- Notification Toast -->
    <div class="toast" id="toast">
        <div class="toast-content">
            <div class="toast-icon" id="toast-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="toast-message" id="toast-message">Absensi berhasil!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
